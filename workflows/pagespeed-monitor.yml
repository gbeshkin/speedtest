name: PageSpeed Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

concurrency:
  group: pagespeed-monitor
  cancel-in-progress: true

jobs:
  monitor:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --no-cache-dir requests

      - name: Run PageSpeed script
        env:
          PSI_API_KEY: ${{ secrets.PSI_API_KEY }}
        run: |
          python pagespeed.py
          echo "=== reports folder ==="
          ls -la reports

      - name: Publish report to Pages
        run: |
          mkdir -p docs
          cp reports/latest.html docs/index.html
          cp reports/latest.html docs/latest.html
          touch docs/.nojekyll
          echo "=== docs folder ==="
          ls -la docs

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs
          git diff --quiet && git diff --staged --quiet || git commit -m "auto: update pagespeed report"
          git push