name: PageSpeed Monitor (GitHub Pages)

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

concurrency:
  group: pagespeed-monitor
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install --no-cache-dir requests

      - name: Run PageSpeed
        env:
          PSI_API_KEY: ${{ secrets.PSI_API_KEY }}
        run: |
          python pagespeed.py
          ls -la reports
          test -f reports/latest.html

      - name: Prepare site folder
        run: |
          mkdir -p site
          cp reports/latest.html site/index.html
          cp reports/latest.html site/latest.html
          touch site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4