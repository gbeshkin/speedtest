name: PageSpeed Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

concurrency:
  group: pagespeed-monitor
  cancel-in-progress: true

jobs:
  monitor:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --no-cache-dir requests

      - name: Run PageSpeed monitor
        env:
          PSI_API_KEY: ${{ secrets.PSI_API_KEY }}
        run: |
          python pagespeed.py
          ls -la reports

      - name: Prepare GitHub Pages
        run: |
          mkdir -p docs
          cp reports/latest.html docs/index.html
          cp reports/latest.html docs/latest.html
          touch docs/.nojekyll

      - name: Commit & push report
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs
          git commit -m "auto: update pagespeed report" || echo "No changes"
          git push